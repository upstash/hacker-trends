<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Hacker News-style mark: orange square, white frame, but a bold "T". -->
  <rect width="100" height="100" fill="#ff6600"/>
  <rect x="4.5" y="4.5" width="91" height="91" fill="none" stroke="#ffffff" stroke-width="5"/>
  <!-- The T, drawn as two rects so it renders identically without a font. -->
  <rect x="27" y="29" width="46" height="12" fill="#ffffff"/>
  <rect x="44" y="29" width="12" height="43" fill="#ffffff"/>
</svg>
